name: Broadcast — Diffusion multi-protocoles

on:
  push:
    branches: [main]
    paths:
      - 'src/data/config.json'

jobs:
  broadcast:
    runs-on: ubuntu-latest
    # Les secrets sont mappés en variables d'env au niveau du job
    # (les conditions if ne peuvent pas accéder directement à secrets)
    env:
      MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
      MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
      NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
      SITE_URL: ${{ secrets.SITE_URL || 'https://w00-board.pages.dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Extraire les données de config
        id: config
        run: |
          MESSAGE=$(node -e "process.stdout.write(require('./src/data/config.json').billboards[0].message)")
          AUTHOR=$(node -e "process.stdout.write(require('./src/data/config.json').billboards[0].author)")
          HASHTAGS=$(node -e "
            const cfg = require('./src/data/config.json');
            const tags = cfg.billboards[0].tags || [];
            process.stdout.write(tags.length ? tags.map(t => '#' + t.replace(/\s+/g, '')).join(' ') : '#Billboard #W00Board');
          ")
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "hashtags=$HASHTAGS" >> $GITHUB_OUTPUT

      - name: Afficher le message à diffuser
        run: |
          echo "Message : ${{ steps.config.outputs.message }}"
          echo "Auteur  : ${{ steps.config.outputs.author }}"

      # ── Mastodon (Fediverse) ────────────────────────────────────────────
      - name: Publier sur Mastodon
        continue-on-error: true
        env:
          MSG: ${{ steps.config.outputs.message }}
          AUTHOR: ${{ steps.config.outputs.author }}
          HASHTAGS: ${{ steps.config.outputs.hashtags }}
        run: |
          if [ -z "$MASTODON_TOKEN" ] || [ -z "$MASTODON_INSTANCE" ]; then
            echo "⏭ Mastodon non configuré — ajoutez MASTODON_TOKEN et MASTODON_INSTANCE dans les secrets"
            exit 0
          fi
          STATUS=$(printf '📋 %s\n\n— %s\n%s\n\n🔗 %s' "$MSG" "$AUTHOR" "$HASHTAGS" "$SITE_URL")
          curl -s -X POST \
            -H "Authorization: Bearer $MASTODON_TOKEN" \
            -F "status=$STATUS" \
            -F "visibility=public" \
            "$MASTODON_INSTANCE/api/v1/statuses"
          echo "✓ Mastodon publié"

      # ── Bluesky (AT Protocol) ───────────────────────────────────────────
      - name: Publier sur Bluesky
        continue-on-error: true
        env:
          MESSAGE: ${{ steps.config.outputs.message }}
        run: |
          if [ -z "$BLUESKY_HANDLE" ] || [ -z "$BLUESKY_PASSWORD" ]; then
            echo "⏭ Bluesky non configuré — ajoutez BLUESKY_HANDLE et BLUESKY_PASSWORD dans les secrets"
            exit 0
          fi
          node scripts/post-bluesky.mjs

      # ── Nostr ───────────────────────────────────────────────────────────
      - name: Publier sur Nostr
        continue-on-error: true
        env:
          MESSAGE: ${{ steps.config.outputs.message }}
        run: |
          if [ -z "$NOSTR_PRIVATE_KEY" ]; then
            echo "⏭ Nostr non configuré — ajoutez NOSTR_PRIVATE_KEY dans les secrets"
            exit 0
          fi
          node scripts/post-nostr.mjs

      - name: Résumé de diffusion
        run: echo "✓ Broadcasting terminé"
