name: Build & Test (Cloudflare Pages déploie automatiquement)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test

      - name: Build statique
        run: npm run build

      - name: Vérifier les fichiers critiques générés
        run: |
          test -f dist/index.html       && echo "✓ index.html"
          test -f dist/og-image.png     && echo "✓ og-image.png"
          test -f dist/llms.txt         && echo "✓ llms.txt"
          test -f dist/llms-full.txt    && echo "✓ llms-full.txt"
          test -f dist/feed.xml         && echo "✓ feed.xml"
          test -f dist/feed.json        && echo "✓ feed.json"
          test -f dist/sitemap.xml       && echo "✓ sitemap.xml"
          test -f dist/robots.txt       && echo "✓ robots.txt"

      # Cloudflare Pages surveille la branche main et déploie automatiquement
      # dès que ce job de build/test passe avec succès.
